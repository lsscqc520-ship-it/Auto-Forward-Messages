<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        :root { --bg-dark: #0f141c; --card-bg: #1a2332; --accent-color: #38bdf8; --text-light: #f3f4f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: sans-serif; padding-bottom: 50px; }
        .header { background: #1e293b; padding: 15px 20px; border-bottom: 2px solid var(--accent-color); position: sticky; top: 0; }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent-color); }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        .video-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .video-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; }
        .thumb-box { aspect-ratio: 16/10; background: #000; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .video-title { padding: 10px; font-size: 13px; font-weight: bold; height: 40px; overflow: hidden; }
    </style>
</head>
<body>
    <div class="header"><div class="logo">Video Station</div></div>
    <div class="player-wrapper"><video id="videoPlayer" controls playsinline></video></div>
    <div class="video-grid" id="videoContainer">加载中...</div>

    <script>
        const player = document.getElementById('videoPlayer');
        const container = document.getElementById('videoContainer');
        // 使用刚才测试成功的接口地址
        const api = "https://corsproxy.io/?https://cj.ffzyapi.com/api.php/provide/vod/?ac=detail";
        let hls;

        function playVideo(url) {
            if (Hls.isSupported() && url.includes('.m3u8')) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
            } else {
                player.src = url;
                player.play();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function load() {
            try {
                let res = await fetch(api);
                let data = await res.json();
                container.innerHTML = "";
                data.list.forEach(item => {
                    let card = document.createElement('div');
                    card.className = 'video-card';
                    // 自动取第一个播放地址
                    let url = item.vod_play_url.split('$$$')[0].split('#')[0].split('$')[1];
                    card.onclick = () => playVideo(url);
                    card.innerHTML = `<div class="thumb-box"><img src="${item.vod_pic}"></div><div class="video-title">${item.vod_name}</div>`;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = "加载失败，请刷新";
            }
        }
        load();
    </script>
</body>
</html>
