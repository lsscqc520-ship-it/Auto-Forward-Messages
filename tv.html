<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Video Hub Debug</title>
</head>
<body style="background:#0f141c; color:#fff; padding:20px; font-family:sans-serif;">
    <h3>调试信息：</h3>
    <div id="debugInfo" style="word-break: break-all; color: #ff6b6b;">正在尝试简单连接...</div>

    <script>
        const debugDiv = document.getElementById('debugInfo');
        // 直接请求，不经过复杂的编码，看看能不能通
        const url = "https://corsproxy.io/?https://cj.ffzyapi.com/api.php/provide/vod/?ac=list";

        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error("HTTP 状态码: " + response.status);
                return response.json();
            })
            .then(data => {
                debugDiv.style.color = "#38bdf8";
                debugDiv.innerText = "成功！获取到数据，列表长度: " + (data.list ? data.list.length : "未知");
            })
            .catch(error => {
                debugDiv.innerText = "错误: " + error.message;
            });
    </script>
</body>
</html>
