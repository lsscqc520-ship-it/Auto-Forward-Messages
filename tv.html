<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Station</title>
    <style>
        :root { --bg-dark: #0f141c; --accent: #0088cc; }
        body { background-color: var(--bg-dark); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: black; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; }
        .status-msg { margin-top: 15px; text-align: center; color: #888; font-size: 14px; }
        .loading { color: var(--accent); }
    </style>
</head>
<body>

<div class="player-wrapper">
    <video id="videoPlayer" controls playsinline></video>
</div>
<div id="status" class="status-msg">准备连接视频源...</div>

<script>
    // 选取的稳定源列表
    const videoSources = [
        "https://pku.xthpdkw.com",
        "https://scu.bbjhmptj.com",
        "https://sysu.qahusxaaj.cc"
    ];

    const videoPlayer = document.getElementById('videoPlayer');
    const status = document.getElementById('status');
    let currentSourceIndex = 0;

    function tryNextSource() {
        if (currentSourceIndex < videoSources.length) {
            const url = videoSources[currentSourceIndex];
            status.innerHTML = `<span class="loading">正在尝试连接: ${url} ...</span>`;
            videoPlayer.src = url;
            videoPlayer.play().catch(() => {
                status.innerText = `连接失败，正在切换下一个源...`;
                currentSourceIndex++;
                setTimeout(tryNextSource, 1000);
            });
        } else {
            status.innerText = "所有源均无法连接，请检查网络或稍后再试。";
        }
    }

    // 初始化加载
    tryNextSource();

    // 监听错误事件，自动切换
    videoPlayer.onerror = () => {
        currentSourceIndex++;
        tryNextSource();
    };
</script>
</body>
</html>
