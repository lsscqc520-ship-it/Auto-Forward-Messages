<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>购物车系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f7f7f7}
.nav{display:flex;gap:8px;padding:12px;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0}
.nav-item{padding:10px 14px;border-radius:10px;cursor:pointer;background:#f1f1f1}
.nav-item.active{background:#111;color:#fff}
.tab-view{display:none;padding:16px}
.tab-view.active{display:block}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px;margin-bottom:10px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select{padding:10px;border:1px solid #ddd;border-radius:10px}
.btn{padding:8px 12px;border:0;border-radius:10px;cursor:pointer}
.p{background:#111;color:#fff}.w{background:#ffcc00}.d{background:#ff4d4f;color:#fff}.g{background:#22c55e;color:#fff}
.muted{color:#777}
</style>
</head>
<body>
<div class="nav">
  <div class="nav-item active" data-tab="view-stores">🏪 商家</div>
  <div class="nav-item" data-tab="view-cart">🛒 购物车</div>
  <div class="nav-item" data-tab="view-orders">📋 订单</div>
  <div class="nav-item" data-tab="view-admin">⚙️ 管理</div>
</div>

<div id="view-stores" class="tab-view active"><h2>商家列表</h2><div id="store-list" class="muted">加载中...</div></div>

<div id="view-cart" class="tab-view">
  <h2>购物车</h2>
  <div class="card">共 <b id="cart-count">0</b> 件，合计 ¥<b id="cart-total">0.00</b> <button class="btn p" onclick="checkout()">提交订单</button></div>
  <div id="cart-list" class="muted">购物车为空</div>
</div>

<div id="view-orders" class="tab-view"><h2>订单</h2><div id="order-list" class="muted">暂无订单</div></div>

<div id="view-admin" class="tab-view">
  <h2>管理</h2>
  <div class="card row">
    <input id="store-input" placeholder="输入商家名称" />
    <button class="btn w" onclick="addStore()">添加商家</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://dzesfxynbljtkwsbhbvq.supabase.co';
const SUPABASE_KEY='YOUR_KEY_HERE';
const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let cart={};

const esc=t=>String(t??'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));

function switchTab(id){document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelector(`[data-tab="${id}"]`).classList.add('active');if(id==='view-orders')loadOrders();}
document.querySelectorAll('.nav-item').forEach(x=>x.onclick=()=>switchTab(x.dataset.tab));

async function loadStores(){try{const {data,error}=await client.from('stores').select('*').order('created_at',{ascending:false});if(error)throw error;renderStores(data||[])}catch(e){console.error(e);store-list.innerHTML='❌ 加载失败';}}
function renderStores(list){const c=document.getElementById('store-list');if(!list.length){c.innerHTML='暂无商家';return}
c.innerHTML=list.map(s=>`<div class="card row" style="justify-content:space-between"><div><b>${esc(s.name)}</b><div class="muted">ID: ${esc(s.id)}</div></div><div class="row"><button class="btn w" data-add="${s.id}" data-name="${esc(s.name)}">添加</button><button class="btn d" onclick="deleteStore('${s.id}')">删除</button></div></div>`).join('');
c.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addToCart(b.dataset.add,b.dataset.name));}
