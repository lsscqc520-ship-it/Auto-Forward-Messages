<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量化外卖系统</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background: #f8f8f8; font-family: sans-serif; padding-bottom: 60px; }
        .tab-content { display: none; padding: 15px; }
        .active { display: block; }
        .nav-fixed { position: fixed; bottom: 0; width: 100%; height: 55px; background: #fff; display: flex; justify-content: space-around; border-top: 1px solid #ddd; align-items: center; z-index: 999; }
        .card { background: #fff; padding: 12px; margin-bottom: 10px; border-radius: 10px; }
        .btn-main { background: #ffcc00; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tab-home" class="tab-content active">
        <h2>附近商家</h2>
        <div id="store-container"></div>
    </div>

    <div id="tab-promo" class="tab-content">
        <h2>限时特价</h2>
        <div id="promo-container"></div>
    </div>

    <div id="tab-orders" class="tab-content">
        <h2>我的订单</h2>
        <div id="order-container"></div>
    </div>

    <div id="tab-profile" class="tab-content">
        <h2>账户中心</h2>
        <div class="card">联系方式: 138-xxxx-xxxx</div>
    </div>

    <nav class="nav-fixed">
        <button onclick="showTab('tab-home')">主页</button>
        <button onclick="showTab('tab-promo')">特价</button>
        <button onclick="showTab('tab-orders')">订单</button>
        <button onclick="showTab('tab-profile')">我</button>
    </nav>

    <script>
        const client = supabase.createClient("YOUR_URL", "YOUR_KEY");

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // 初始化加载函数
        async function initData() {
            // 加载主页商家
            const { data: stores } = await client.from('stores').select('*');
            document.getElementById('store-container').innerHTML = stores.map(s => `
                <div class="card"><strong>${s.name}</strong><p>${s.description}</p></div>
            `).join('');

            // 加载订单逻辑
            const { data: orders } = await client.from('orders').select('*').limit(5);
            document.getElementById('order-container').innerHTML = orders.map(o => `
                <div class="card">订单：${o.items} <br>状态：<b style="color:green">${o.status}</b></div>
            `).join('');
        }
        initData();
    </script>
</body>
</html>
