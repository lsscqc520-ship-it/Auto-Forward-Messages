<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖服务</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #FFD300; --bg: #F5F5F5; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, sans-serif; padding-bottom: 80px; }
        .tab { display: none; } .tab.active { display: block; }
        
        /* 极致简约卡片 */
        .card { background: #fff; margin: 10px; padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .plus-btn { background: var(--primary); width: 36px; height: 36px; border-radius: 50%; border: none; font-size: 20px; font-weight: bold; color: #000; display: flex; align-items: center; justify-content: center; }
        
        /* 导航 */
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; }
        
        /* 支付页 */
        .pay-wrap { padding: 40px 20px; text-align: center; }
        .pay-btn { background: #0056D2; color: white; width: 100%; padding: 14px; border-radius: 25px; border: none; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="view-home" class="tab active">
        <div style="padding: 20px; font-size: 18px; font-weight: bold;">热门商户</div>
        <div id="store-list"></div>
    </div>

    <div id="view-pay" class="tab">
        <div class="pay-wrap">
            <div style="font-size: 14px; color: #666;">订单金额</div>
            <div id="price-val" style="font-size: 32px; font-weight: 700; margin: 10px 0;">¥0</div>
            <img src="https://i.ibb.co/BKf8xrTP/IMG-1422.jpg" style="width: 150px; margin: 20px 0;">
            <button class="pay-btn" onclick="goBack()">确认支付</button>
        </div>
    </div>

    <div class="nav">
        <div onclick="switchTab('view-home')">首页</div>
        <div onclick="switchTab('view-orders')">订单</div>
        <div onclick="switchTab('view-admin')">管理</div>
    </div>

    <script>
        const client = supabase.createClient("https://dzesfxynbljtkwsbhbvq.supabase.co", "sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ");

        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function loadStores() {
            const { data } = await client.from('stores').select('*');
            document.getElementById('store-list').innerHTML = data?.map(s => `
                <div class="card">
                    <div style="font-weight: 500;">${s.name}</div>
                    <button class="plus-btn" onclick="pay(19.9)">+</button>
                </div>
            `).join('');
        }

        function pay(amt) {
            document.getElementById('price-val').innerText = "¥" + amt;
            switchTab('view-pay');
        }
        
        function goBack() { 
            alert('支付完成'); 
            switchTab('view-home'); 
        }

        loadStores();
    </script>
</body>
</html>
