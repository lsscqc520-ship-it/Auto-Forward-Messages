// 1. 修改 init() 函数：删除 alert，并加上图片逻辑
async function init() {
    const { data } = await client.from('products').select('*');
    document.getElementById('menu-list').innerHTML = data.map(item => `
        <div class="card" style="display:flex; align-items:center;">
            <!-- 菜品照片区 -->
            <img src="${item.image_url || 'https://via.placeholder.com/60'}" style="width:60px; height:60px; border-radius:8px; margin-right:15px;">
            <div style="flex-grow:1;">
                <strong>${item.name}</strong><br>
                <span style="color:#ffcc00;">¥${item.price}</span>
            </div>
            <!-- 去掉alert，改成静默添加 -->
            <button class="btn" onclick="cart.push({name:'${item.name}', price:${item.price}, count:1});">添加</button>
        </div>
    `).join('');
}
