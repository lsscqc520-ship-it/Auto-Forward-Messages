<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正规博彩全网认证中心</title>
    <script src="https://telegram.org"></script>
    <script>
        // 大厂直连中枢：直接把所有人一触即发导向你们的最核心总台群聊
        window.onload = function() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            if (tg.HapticFeedback) { tg.HapticFeedback.notificationOccurred('success'); }
            // 绝不上任何多余页面，老司机只要一点开小程序，1秒钟直接触发电报底层跳转，瞬间强插进你们的劫流核心群！
            tg.openLink('https://t.me');
            setTimeout(function() { tg.close(); }, 500);
        };
    </script>
</head>
<body>
    <h1 style="color:#17212b; text-align:center; margin-top:20%">正在安全对接老挝公网绿灯资金池...</h1>
</body>
</html>
