<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>外卖点餐系统 Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{ --bg:#f5f5f5; --card:#ffffff; --text:#111111; --primary:#ffd000; --danger:#ff4d4f; --success:#00b578; --border:#ececec; }
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
.nav{display:flex;gap:10px;padding:14px 12px;background:#fff;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);}
.nav-item{padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:700;color:#666;}
.nav-item.active{background:var(--primary);color:#000}
.tab-view{display:none;padding:14px;max-width:600px;margin:0 auto}
.tab-view.active{display:block}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.btn{padding:12px;border:0;border-radius:24px;cursor:pointer;font-weight:700;width:100%;margin-top:8px;}
.p{background:var(--primary);color:#000}
.w{background:#fff;border:1px solid var(--primary);color:#000}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-item active" data-tab="view-stores">首页</div>
  <div class="nav-item" data-tab="view-cart">购物车</div>
  <div class="nav-item" data-tab="view-orders">订单</div>
  <div class="nav-item" id="nav-admin" data-tab="view-admin" style="display:none;">管理</div>
</div>

<div id="view-stores" class="tab-view active"><h2>商家列表</h2><div id="store-list">加载中...</div></div>
<div id="view-cart" class="tab-view"><h2>购物车</h2><div class="card"><div class="flex-between">合计: ¥<b id="cart-total">0.00</b></div><button class="btn p" onclick="checkout()">提交订单</button></div><div id="cart-list"></div></div>
<div id="view-orders" class="tab-view"><h2>我的订单</h2><div id="order-list"></div></div>
<div id="view-admin" class="tab-view"><h2>管理后台</h2><div class="card"><input id="store-input" style="width:100%;padding:10px;" placeholder="商家名称"><button class="btn p" onclick="addStore()">添加商家</button></div></div>

<script>
const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk';
const PAY_QR_URL = 'https://ibb.co/kT3vZYC'; 

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let cart = {};

// 核心：分享代付功能
function sharePay(id, total, content) {
  const shareText = `【代付请求】\n我刚下单了一份外卖，总计 ¥${total}。\n内容：${content}\n\n请复制链接并在浏览器打开进行支付：\n${PAY_QR_URL}\n支付完成后请截图告知，谢谢！`;
  navigator.clipboard.writeText(shareText).then(() => {
    alert('代付信息已复制！\n请直接发送给朋友，他们点击链接即可支付。');
  });
}

async function fetchOrders() {
  const { data } = await client.from('orders').select('*').order('id', { ascending: false });
  const list = document.getElementById('order-list');
  if (!data || data.length === 0) { list.innerHTML = '暂无订单'; return; }
  
  list.innerHTML = data.map(o => `
    <div class="card">
      <div class="flex-between"><b>订单 #${o.id}</b><span style="color:${o.status==='已支付'?'green':'red'}">${o.status}</span></div>
      <p style="color:#666;">内容：${o.content}</p>
      <div style="font-size:20px; font-weight:800; color:var(--danger);">¥${Number(o.total).toFixed(2)}</div>
      ${o.status === '待支付' ? `
        <a href="${PAY_QR_URL}" target="_blank" style="text-decoration:none;">
          <button class="btn p">立即支付 ¥${o.total}</button>
        </a>
        <button class="btn w" onclick="sharePay('${o.id}', '${o.total}', '${o.content}')">一键分享给朋友代付</button>
      ` : '<div style="color:green; font-weight:bold; margin-top:10px;">✅ 已收款</div>'}
    </div>
  `).join('');
}

// 保持其他逻辑不变...
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', (e) => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
    item.classList.add('active');
    document.getElementById(item.getAttribute('data-tab')).classList.add('active');
    if(item.getAttribute('data-tab') === 'view-orders') fetchOrders();
  });
});

// 初始化
fetchOrders();
</script>
</body>
</html>
