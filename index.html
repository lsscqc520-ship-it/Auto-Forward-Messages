<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f141c; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .card { background: #1a2332; width: 100%; max-width: 500px; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; box-sizing: border-box; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .btn { background: #ffcc00; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #1a2332; }
    </style>
</head>
<body>
    <div id="panel-menu" style="width: 100%; max-width: 500px;">
        <h2 style="text-align:center;">今日菜单</h2>
        <div id="menu-list">Loading...</div>
    </div>

    <div style="position: fixed; bottom: 80px; right: 20px; z-index: 999;">
        <button onclick="openCheckout()" style="padding: 15px; border-radius: 50%; background: #ffcc00; border:none; font-size:20px;">🛒</button>
    </div>

    <div id="modal-checkout" class="modal">
        <div class="card" style="background: white; color: #333; width: 90%; max-width: 350px; text-align: center;">
            <h3>支付确认</h3>
            <div id="checkout-details" style="text-align: left; font-size: 14px; margin-bottom: 15px;"></div>
            <div style="font-weight:bold; margin: 15px 0;">实付: <span id="checkout-price" style="color:red; font-size:24px;">¥0</span></div>
            <button class="btn" style="width:100%; background:#07c160; color:white;" onclick="handlePayment()">我已付款，确认下单</button>
            <button onclick="document.getElementById('modal-checkout').style.display='none'" style="background:none; border:none; color:#999; margin-top:10px;">返回</button>
        </div>
    </div>

    <div id="panel-status" class="card" style="display:none; position:fixed; top:20px; z-index:1001; text-align:center;">
        <h3>订单进度</h3>
        <p id="statusText" style="font-size:20px; color:#07c160;"></p>
    </div>

    <script>
        const client = supabase.createClient("https://dzesfxynbljtkwsbhbvq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk");
        let cart = [];

        function openCheckout() {
            let total = cart.reduce((sum, i) => sum + (i.price * i.count), 0);
            document.getElementById('checkout-details').innerHTML = cart.map(i => `${i.name} x${i.count}`).join('<br>');
            document.getElementById('checkout-price').innerText = '¥' + total;
            document.getElementById('modal-checkout').style.display = 'flex';
        }

        async function handlePayment() {
            let memo = prompt("请输入您的称呼或转账备注:");
            if (!memo) return;
            if (!confirm("确认已完成支付？")) return;

            document.getElementById('modal-checkout').style.display = 'none';
            document.getElementById('panel-status').style.display = 'block';
            
            let total = cart.reduce((sum, i) => sum + (i.price * i.count), 0);
            await client.from('orders').insert([{ customer_name: memo, total_price: total, items: cart.map(i=>i.name).join(','), status: 'paid' }]);
            
            const steps = ["订单已确认...", "备餐中...", "骑手配送中...", "已送达!"];
            for(let s of steps) { document.getElementById('statusText').innerText = s; await new Promise(r => setTimeout(r, 2000)); }
        }

        async function init() {
            const { data } = await client.from('products').select('*');
            document.getElementById('menu-list').innerHTML = data.map(item => `
                <div class="card"><strong>${item.name}</strong> - ¥${item.price} 
                <button class="btn" onclick="cart.push({name:'${item.name}', price:${item.price}, count:1}); alert('已添加');">+</button></div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
