<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>美团外卖 - 支付中心</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{ --bg:#f4f4f4; --card:#fff; --primary:#ffd100; --text:#333; --danger:#ff4d4f; }
body{margin:0;font-family: -apple-system, sans-serif; background:var(--bg); color:var(--text);}
.nav{display:flex; justify-content:space-around; padding:14px; background:#fff; position:sticky; top:0; z-index:100; border-bottom:1px solid #eee; box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.nav-item{font-size:14px; color:#666; cursor:pointer;}
.nav-item.active{color:#333; font-weight:800; border-bottom:2px solid var(--primary);}
.tab-view{display:none; padding:15px;}
.tab-view.active{display:block}
.card{background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.05);}
.btn-primary{background:var(--primary); border:none; padding:12px; border-radius:24px; font-weight:bold; width:100%; font-size:16px;}
.btn-share{background:#fff; border:1px solid #ffd100; color:#333; padding:12px; border-radius:24px; width:100%; margin-top:10px; font-size:16px;}
.badge-status{background:#fff3e0; color:#e65100; padding:2px 8px; border-radius:4px; font-size:12px;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-item active" data-tab="view-stores">首页</div>
  <div class="nav-item" data-tab="view-cart">购物车</div>
  <div class="nav-item" data-tab="view-orders">订单</div>
</div>

<div id="view-orders" class="tab-view active">
  <h2>我的订单</h2>
  <div id="order-list">加载中...</div>
</div>

<script>
const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk';
const PAY_QR_URL = 'https://ibb.co/kT3vZYC'; 

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function fetchOrders() {
  const { data } = await client.from('orders').select('*').order('id', { ascending: false });
  const list = document.getElementById('order-list');
  
  if (!data || data.length === 0) { list.innerHTML = '暂无订单'; return; }

  list.innerHTML = data.map(o => `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <b>订单 #${o.id}</b>
        <span class="badge-status">${o.status}</span>
      </div>
      <p style="font-size:14px; color:#666; margin:10px 0;">内容：${o.content || ''}</p>
      <div style="font-size:20px; font-weight:800; color:#ff4d4f; margin-bottom:15px;">¥${Number(o.total).toFixed(2)}</div>
      
      ${o.status === '待支付' ? `
        <a href="${PAY_QR_URL}" target="_blank" style="text-decoration:none;">
          <button class="btn-primary">立即支付 ¥${Number(o.total).toFixed(2)}</button>
        </a>
        <button class="btn-share" onclick="sharePay('${o.id}', '${o.total}', '${o.content}')">找人代付</button>
      ` : '<div style="color:green; font-weight:bold;">✅ 支付已完成</div>'}
    </div>
  `).join('');
}

// 一键代付功能：生成标准化的美团代付信息
function sharePay(id, total, content) {
  const shareText = `【美团代付】\n我刚下单了一笔外卖，总计 ¥${total}。\n内容：${content}\n请点击下方收款码完成支付：\n${PAY_QR_URL}\n支付完成后请截图发给我，谢谢！`;
  
  // 复制到剪贴板
  navigator.clipboard.writeText(shareText).then(() => {
    alert('代付信息已复制！\n\n请直接粘贴发送给朋友。\n朋友看到金额后即可通过上方收款码完成支付。');
  });
}

// 自动刷新订单
fetchOrders();
</script>
</body>
</html>
