<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>外卖点餐系统 Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{ --bg:#f4f4f4; --card:#fff; --primary:#ffd100; --text:#333; --danger:#ff4d4f; }
body{margin:0;font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text);}
.nav{display:flex; justify-content:space-around; padding:12px; background:#fff; position:sticky; top:0; z-index:100; border-bottom:1px solid #eee;}
.nav-item{font-size:14px; color:#666; cursor:pointer;}
.nav-item.active{color:#333; font-weight:800; border-bottom:2px solid var(--primary);}
.tab-view{display:none; padding:15px;}
.tab-view.active{display:block}
.card{background:#fff; border-radius:12px; padding:15px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,.05);}
.btn-primary{background:var(--primary); border:none; padding:10px 20px; border-radius:20px; font-weight:bold; width:100%;}
.btn-share{background:#fff; border:1px solid #ffd100; color:#333; padding:10px 20px; border-radius:20px; width:100%; margin-top:8px;}
.badge-status{background:#fff3e0; color:#e65100; padding:2px 8px; border-radius:4px; font-size:12px;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-item active" data-tab="view-stores">首页</div>
  <div class="nav-item" data-tab="view-cart">购物车</div>
  <div class="nav-item" data-tab="view-orders">订单</div>
  <div class="nav-item" id="nav-admin" data-tab="view-admin" style="display:none;">管理</div>
</div>

<div id="view-stores" class="tab-view active">
  <h2>热门商家</h2>
  <div id="store-list">加载中...</div>
</div>

<div id="view-cart" class="tab-view">
  <h2>确认下单</h2>
  <div id="cart-list">购物车空空如也</div>
  <div class="card" style="margin-top:20px;">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>小计</span><b>¥<span id="cart-total">0.00</span></b></div>
    <button class="btn-primary" onclick="checkout()">立即下单</button>
  </div>
</div>

<div id="view-orders" class="tab-view">
  <h2>我的订单</h2>
  <div id="order-list">加载中...</div>
</div>

<div id="view-admin" class="tab-view">
  <h2>管理员后台</h2>
  <div class="card">
    <input id="store-input" style="width:100%; padding:10px; border:1px solid #ccc;" placeholder="商家名称">
    <button class="btn-primary" style="margin-top:10px;" onclick="addStore()">添加商家</button>
  </div>
</div>

<script>
const SUPABASE_URL = '你的SUPABASE_URL';
const SUPABASE_KEY = '你的SUPABASE_KEY';
const PAY_QR_URL = 'https://ibb.co/kT3vZYC'; // 你的收款码链接

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let cart = {};

// 切换Tab逻辑
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', (e) => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById(e.target.getAttribute('data-tab')).classList.add('active');
  });
});

async function fetchOrders() {
  const { data } = await client.from('orders').select('*').order('id', { ascending: false });
  const list = document.getElementById('order-list');
  list.innerHTML = data.map(o => `
    <div class="card">
      <div style="display:flex; justify-content:space-between;"><b>订单 #${o.id}</b><span class="badge-status">${o.status}</span></div>
      <p>${o.content}</p>
      <div style="font-size:18px; font-weight:800; color:red;">¥${o.total}</div>
      ${o.status === '待支付' ? `
        <a href="${PAY_QR_URL}" target="_blank"><button class="btn-primary">去支付</button></a>
        <button class="btn-share" onclick="sharePay('${o.id}', '${o.total}', '${o.content}')">找人代付</button>
      ` : ''}
    </div>
  `).join('');
}

function sharePay(id, total, content) {
  const text = `【美团外卖代付】订单#${id}，总价¥${total}。请长按下方链接扫码支付，订单内容：${content}。收款码：${PAY_QR_URL}`;
  navigator.clipboard.writeText(text).then(() => alert('代付信息已复制！快发给朋友吧。'));
}

// 注意：你需要确保你的 Supabase 已按照之前步骤设置好权限，否则此代码无法调用。
// fetchStores(); fetchProducts(); 等逻辑同之前代码结构一致，只需替换到这里即可。
</script>
</body>
</html>
