<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>成人私密影视大厅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0b0f19; color: #fff; font-family: sans-serif; padding-bottom: 40px; }
        .header { background: linear-gradient(135deg, #1f2937, #111827); padding: 15px; display: flex; align-items: center; border-bottom: 2px solid #ef4444; position: sticky; top: 0; z-index: 100; }
        .back-btn { color: #ef4444; font-size: 20px; font-weight: bold; text-decoration: none; margin-right: 15px; cursor: pointer; }
        .title { font-size: 18px; font-weight: bold; color: #ef4444; }
        .player-container { width: 100%; background: #000; position: relative; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .video-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; padding: 20px; text-align: center; z-index: 10; }
        .overlay-title { font-size: 16px; color: #ef4444; font-weight: bold; margin-bottom: 8px; }
        .overlay-text { font-size: 12px; color: #d1d5db; line-height: 1.5; margin-bottom: 15px; }
        .overlay-btn { background: #ef4444; color: #fff; text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .video-section-title { font-size: 15px; color: #9ca3af; padding: 15px 12px 5px 12px; text-align: left; font-weight: bold; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px; }
        .video-card { background: #1e293b; border-radius: 8px; overflow: hidden; border: 1px solid #334155; position: relative; }
        .video-thumb-box { position: relative; width: 100%; height: 110px; }
        .video-thumb { width: 100%; height: 100%; object-fit: cover; }
        .video-duration { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; padding: 2px 4px; border-radius: 3px; }
        .video-info { padding: 8px; text-align: left; }
        .video-title { font-size: 13px; font-weight: bold; line-height: 1.3; height: 34px; overflow: hidden; color: #f3f4f6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .lock-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .lock-content { background: #1e293b; border: 2px solid #ef4444; border-radius: 16px; padding: 25px; width: 100%; max-width: 320px; text-align: center; }
        .lock-title { font-size: 20px; font-weight: bold; color: #ef4444; margin-bottom: 12px; }
        .lock-text { font-size: 13px; color: #e5e7eb; line-height: 1.6; margin-bottom: 20px; text-align: left; }
        .lock-btn { display: block; width: 100%; background: linear-gradient(to right, #ef4444, #b91c1c); color: #fff; text-decoration: none; padding: 12px 0; border-radius: 8px; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" onclick="window.history.back()">⬅</div>
        <div class="title">🔞 极速成人私密影院</div>
    </div>
    <div class="player-container">
        <video id="mainVideo" controls autoplay playsinline src="https://w3schools.com"></video>
        <div class="video-overlay" id="videoOverlay">
            <div class="overlay-title">⚠️ 试看结束 播放已断开</div>
            <div class="overlay-text">由于未完成安全认证，请解锁后续完整未删减高潮剧情。</div>
            <a class="overlay-btn" href="javascript:void(0)" onclick="triggerLock()">点击解锁完整版</a>
        </div>
    </div>
    <div class="video-section-title">🔥 正在实时热播 (无需翻墙)</div>
    <div class="video-grid">
        <div class="video-card" onclick="switchVideo()">
            <div class="video-thumb-box">
                <img class="video-thumb" src="https://unsplash.com">
                <span class="video-duration">18:42</span>
            </div>
            <div class="video-info"><div class="video-title">【特区独家】极品反差少妇深夜上门兼职...</div></div>
        </div>
    </div>
    <div class="lock-modal" id="lockModal">
        <div class="lock-content">
            <div class="lock-title">⚠️ 视频已锁定</div>
            <div class="lock-text">尊贵的玩家，后续精彩画面及后台【万部高清资源库】已被风控锁死。<br><br>请点击下方按钮返回群聊，<b>邀请 5 位好友</b>成功加入群聊，即可自动为您激活永久免翻墙看片账号！</div>
            <a class="lock-btn" href="https://t.me" target="_blank">返回群聊 邀请5人看完整版</a>
        </div>
    </div>
    <script>
        const video = document.getElementById('mainVideo');
        const overlay = document.getElementById('videoOverlay');
        const lockModal = document.getElementById('lockModal');
        video.addEventListener('timeupdate', function() {
            if (video.currentTime >= 5) {
                video.pause();
                overlay.style.display = 'flex';
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                }
            }
        });
        function triggerLock() { lockModal.style.display = 'flex'; }
        function switchVideo() { video.currentTime = 0; overlay.style.display = 'none'; lockModal.style.display = 'none'; video.play(); }
    </script>
</body>
</html>
