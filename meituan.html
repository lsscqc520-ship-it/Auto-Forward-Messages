<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GoDine</title>
</head>
<body>
    <div id="content">Connecting to database...</div>
    <script>
        const SUPABASE_KEY = 'Sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ';
        const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';

        fetch(`${SUPABASE_URL}/rest/v1/menu?select=*`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        })
        .then(res => res.json())
        .then(data => {
            if (Array.isArray(data)) {
                document.getElementById('content').innerHTML = data.length > 0 
                    ? data.map(item => `<p>${item.name}: ¥${item.price}</p>`).join('')
                    : "No data found in database.";
            } else {
                document.getElementById('content').innerText = "Request failed: " + JSON.stringify(data);
            }
        })
        .catch(err => {
            document.getElementById('content').innerText = "Network error: " + err.message;
        });
    </script>
</body>
</html>
