<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GoDine 菜单</title>
</head>
<body>
    <div id="content">正在连接数据库...</div>

    <script>
        const URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co/rest/v1/menu?select=*';
        // 使用你刚才提供的那个 Key
        const KEY = 'Sb_publishable_sRewE8k63terKgMBcBV3wQ_0LKBXpNZ';

        fetch(URL, {
            headers: {
                'apikey': KEY,
                'Authorization': 'Bearer ' + KEY,
                'Content-Type': 'application/json'
            }
        })
        .then(res => res.json())
        .then(data => {
            if (Array.isArray(data)) {
                if (data.length === 0) {
                    document.getElementById('content').innerText = "菜单为空。";
                } else {
                    document.getElementById('content').innerHTML = "<h2>今日菜单:</h2>" + 
                        data.map(item => `<p>${item.name || '无名'}: ¥${item.price || 0}</p>`).join('');
                }
            } else {
                document.getElementById('content').innerText = "错误: " + JSON.stringify(data);
            }
        })
        .catch(err => {
            document.getElementById('content').innerText = "网络异常: " + err.message;
        });
    </script>
</body>
</html>
