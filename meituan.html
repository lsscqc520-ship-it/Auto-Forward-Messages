<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoDine</title>
</head>
<body style="padding: 20px; font-family: sans-serif; background-color: #f4f7f6;">
    <div id="content" style="font-size: 16px; color: #666;">正在连接数据库...</div>

    <script>
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6ZXNmeHluYmxqdGt3c2JoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2OTI1NjksImV4cCI6MjA5ODI2ODU2OX0.fcpHEdZUqNABHa1fZ0AJtkucwj-MYRPuSzDoQxkkLLk';
        const SUPABASE_URL = 'https://dzesfxynbljtkwsbhbvq.supabase.co';

        fetch(SUPABASE_URL + '/rest/v1/menu?select=*', {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY
            }
        })
        .then(res => {
            if (!res.ok) {
                throw new Error("HTTP状态错误: " + res.status);
            }
            return res.json();
        })
        .then(data => {
            if (Array.isArray(data)) {
                document.getElementById('content').innerHTML = data.length > 0
                    ? data.map(item => '<p style="font-size: 18px; font-weight: bold; color:#2c3e50; margin-bottom:10px;">' + (item.name || '未命名') + ': ¥' + (item.price || 0) + '</p>').join('')
                    : '数据库里没有数据，请去后台添加数据。';
            } else {
                document.getElementById('content').innerText = '请求失败: ' + JSON.stringify(data);
            }
        })
        .catch(err => {
            document.getElementById('content').innerText = '连接失败: ' + err.message;
        });
    </script>
</body>
</html>
